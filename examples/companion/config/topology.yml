stack:
  name: companion
  default_app: main
  default_service: seed

topology:
  profile: local-mesh
  notes:
    - "cluster-next proving ground: one stack, three local node instances"
    - "services represent local nodes; apps remain code boundaries"

deploy:
  compose:
    context: .
    dockerfile: config/deploy/Dockerfile
    working_dir: /app
    volume_name: companion_var
    volume_target: /app/var

services:
  seed:
    role: seed
    apps:
      - main
      - dashboard
    root_app: main
    mounts:
      dashboard: /dashboard
    replicas: 1
    public: true
    http:
      port: 4667
    command: bundle exec ruby stack.rb --service seed
    environment:
      PORT: 4667
      IGNITER_SERVICE: seed
      IGNITER_APP: main
      COMPANION_NODE_NAME: companion-seed
      COMPANION_NODE_ROLE: seed
      COMPANION_NODE_URL: http://127.0.0.1:4667
      COMPANION_LOCAL_CAPABILITIES: notes_api,mesh_seed,routing
      COMPANION_MOCK_CAPABILITIES: notifications
      COMPANION_NODE_TAGS: local,seed
      COMPANION_AUTO_ANNOUNCE: "true"
      COMPANION_START_DISCOVERY: "false"

  edge:
    role: edge
    apps:
      - main
      - dashboard
    root_app: main
    mounts:
      dashboard: /dashboard
    replicas: 1
    public: true
    http:
      port: 4668
    command: bundle exec ruby stack.rb --service edge
    environment:
      PORT: 4668
      IGNITER_SERVICE: edge
      IGNITER_APP: main
      COMPANION_NODE_NAME: companion-edge
      COMPANION_NODE_ROLE: edge
      COMPANION_NODE_URL: http://127.0.0.1:4668
      COMPANION_LOCAL_CAPABILITIES: notes_api,speech_io
      COMPANION_MOCK_CAPABILITIES: whisper_asr,piper_tts
      COMPANION_NODE_TAGS: local,edge,audio
      COMPANION_SEEDS: http://127.0.0.1:4667
      COMPANION_AUTO_ANNOUNCE: "true"
      COMPANION_START_DISCOVERY: "true"

  analyst:
    role: analyst
    apps:
      - main
      - dashboard
    root_app: main
    mounts:
      dashboard: /dashboard
    replicas: 1
    public: true
    http:
      port: 4669
    command: bundle exec ruby stack.rb --service analyst
    environment:
      PORT: 4669
      IGNITER_SERVICE: analyst
      IGNITER_APP: main
      COMPANION_NODE_NAME: companion-analyst
      COMPANION_NODE_ROLE: analyst
      COMPANION_NODE_URL: http://127.0.0.1:4669
      COMPANION_LOCAL_CAPABILITIES: notes_api,assistant_orchestration
      COMPANION_MOCK_CAPABILITIES: local_llm,rag
      COMPANION_NODE_TAGS: local,analyst,reasoning
      COMPANION_SEEDS: http://127.0.0.1:4667
      COMPANION_AUTO_ANNOUNCE: "true"
      COMPANION_START_DISCOVERY: "true"

shared:
  persistence:
    data:
      adapter: sqlite
      path: var/companion_data.sqlite3
