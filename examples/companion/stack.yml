stack:
  name: companion
  root_app: main
  default_node: seed
  shared_lib_paths:
    - lib

server:
  host: 0.0.0.0

nodes:
  seed:
    role: seed
    port: 4667
    public: true
    environment:
      COMPANION_NODE_NAME: companion-seed
      COMPANION_NODE_ROLE: seed
      COMPANION_NODE_URL: http://127.0.0.1:4667
      COMPANION_LOCAL_CAPABILITIES: notes_api,mesh_seed,routing
      COMPANION_MOCK_CAPABILITIES: notifications
      COMPANION_NODE_TAGS: local,seed
      COMPANION_AUTO_ANNOUNCE: "true"
      COMPANION_START_DISCOVERY: "false"

  edge:
    role: edge
    port: 4668
    public: true
    environment:
      COMPANION_NODE_NAME: companion-edge
      COMPANION_NODE_ROLE: edge
      COMPANION_NODE_URL: http://127.0.0.1:4668
      COMPANION_LOCAL_CAPABILITIES: notes_api,speech_io
      COMPANION_MOCK_CAPABILITIES: whisper_asr,piper_tts
      COMPANION_NODE_TAGS: local,edge,audio
      COMPANION_SEEDS: http://127.0.0.1:4667
      COMPANION_AUTO_ANNOUNCE: "true"
      COMPANION_START_DISCOVERY: "true"

  analyst:
    role: analyst
    port: 4669
    public: true
    environment:
      COMPANION_NODE_NAME: companion-analyst
      COMPANION_NODE_ROLE: analyst
      COMPANION_NODE_URL: http://127.0.0.1:4669
      COMPANION_LOCAL_CAPABILITIES: notes_api,assistant_orchestration
      COMPANION_MOCK_CAPABILITIES: local_llm,rag
      COMPANION_NODE_TAGS: local,analyst,reasoning
      COMPANION_SEEDS: http://127.0.0.1:4667
      COMPANION_AUTO_ANNOUNCE: "true"
      COMPANION_START_DISCOVERY: "true"

persistence:
  data:
    adapter: sqlite
    path: var/companion_data.sqlite3
