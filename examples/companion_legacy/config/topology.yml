stack:
  name: companion
  default_app: main
  default_service: main

topology:
  profile: local-compose
  network: companion
  notes:
    - "apps/ define code roles; this file describes deployment roles and wiring"
    - "stack.rb consumes this file for role-aware boot and compose generation"

deploy:
  compose:
    context: ../../../../
    dockerfile: examples/companion_legacy/config/deploy/Dockerfile
    working_dir: /app/examples/companion_legacy
    volume_name: companion_var
    volume_target: /app/examples/companion_legacy/var

services:
  main:
    role: api
    apps:
      - main
    root_app: main
    replicas: 1
    public: true
    http:
      port: 4567
    command: bundle exec ruby stack.rb --service main
    depends_on:
      - inference
    environment:
      COMPANION_EXECUTION_ADAPTER: sqlite
      COMPANION_EXECUTION_DB: var/main_executions.sqlite3
    persistence:
      execution:
        adapter: sqlite
        path: var/main_executions.sqlite3

  inference:
    role: worker
    apps:
      - inference
    root_app: inference
    replicas: 1
    public: false
    http:
      port: 4568
    command: bundle exec ruby stack.rb --service inference
    environment:
      COMPANION_EXECUTION_ADAPTER: sqlite
      COMPANION_EXECUTION_DB: var/inference_executions.sqlite3
    persistence:
      execution:
        adapter: sqlite
        path: var/inference_executions.sqlite3

  dashboard:
    role: admin
    apps:
      - dashboard
    root_app: dashboard
    replicas: 1
    public: true
    http:
      port: 4569
    command: bundle exec ruby stack.rb --service dashboard
    depends_on:
      - main
    environment:
      COMPANION_EXECUTION_ADAPTER: sqlite
      COMPANION_EXECUTION_DB: var/dashboard_executions.sqlite3
    persistence:
      execution:
        adapter: sqlite
        path: var/dashboard_executions.sqlite3

shared:
  environment:
    COMPANION_DATA_ADAPTER: sqlite
    COMPANION_DATA_DB: var/companion_data.sqlite3
  persistence:
    data:
      adapter: sqlite
      path: var/companion_data.sqlite3
